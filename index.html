<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Video Player</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin:0;
      background:#000;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      overflow:hidden;
    }
    video {
      width:100%;
      height:100%;
      object-fit:contain;
    }
    #play-btn {
      position:absolute;
      top:50%;
      left:50%;
      transform:translate(-50%, -50%);
      padding:20px 40px;
      font-size:20px;
      cursor:pointer;
      z-index:10;
      color:#fff;
      background:rgba(0,0,0,0.6);
      border:none;
      border-radius:8px;
      transition:0.2s;
    }
    #play-btn:hover {
      background:rgba(0,0,0,0.8);
    }
  </style>
</head>
<body>

  <!-- Video element points to Google Drive direct download -->
  <video id="video" playsinline controls>
    <source src="https://drive.google.com/uc?export=download&id=1LyMj0kAZB_w-szLzVwGV42KDYpI5URZ5" type="video/mp4">
    Your browser does not support the video tag.
  </video>

  <!-- Single tap button -->
  <button id="play-btn">Tap here to play video</button>

  <script>
    const video = document.getElementById('video');
    const btn = document.getElementById('play-btn');

    btn.onclick = () => {
      // Start playback unmuted
      video.muted = false;
      video.play().catch(err => console.log("Playback failed:", err));

      // Request fullscreen
      if(video.requestFullscreen) {
        video.requestFullscreen();
      } else if(video.webkitRequestFullscreen) { // Safari
        video.webkitRequestFullscreen();
      } else if(video.msRequestFullscreen) { // IE/Edge
        video.msRequestFullscreen();
      }

      // Hide the button
      btn.style.display = 'none';
    };
  </script>
</body>
</html>
